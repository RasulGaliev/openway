<div class="card">
  <div class="card__icon-wrap">
    <app-icon [name]="activity().icon" />
  </div>

  <h3 class="card__title">{{ activity().title }}</h3>
  <p class="card__desc">{{ activity().description }}</p>

  <div class="card__rewards">
    <span class="reward reward--coins">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <path d="M12 6v2m0 8v2M9.5 9.5a2.5 2.5 0 0 1 5 0c0 1.5-1 2-2.5 2.5S9 13.5 9 15a2.5 2.5 0 0 0 5 0"/>
      </svg>
      +{{ activity().coinsReward }} Bivcoins
    </span>
    <span class="reward reward--xp">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
      </svg>
      +{{ activity().xpReward }} XP
    </span>
  </div>

</div>
