<header class="navbar-header">
  <nav class="navbar">
    <a class="navbar__logo" routerLink="/">
      <span class="navbar__logo-name">Openway</span>
      <span class="navbar__logo-slogan">Там, где доверяют людям</span>
    </a>

    <ul class="navbar__links">
      <li>
        <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
          Главная
        </a>
      </li>
      <li>
        <a routerLink="/mf_activity" routerLinkActive="active">Активности</a>
      </li>
      <li>
        <a routerLink="/shop" routerLinkActive="active">Магазин</a>
      </li>
      <li>
        <a routerLink="/profile" routerLinkActive="active">Профиль</a>
      </li>
      @if (user()?.role === 'admin') {
        <li>
          <a routerLink="/admin" routerLinkActive="active">Админ</a>
        </li>
      }
    </ul>

    <div class="navbar__right">
      @if (user()) {
        <span class="navbar__user">{{ user()!.email }}</span>
        <button class="navbar__logout" type="button" (click)="logout.emit()">Выйти</button>
      } @else {
        <a class="navbar__login" routerLink="/login">Войти</a>
      }
    </div>
  </nav>
</header>
